<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
  
  <title>Final PWA</title>
</head>





<body>
  <div class="app" id="app">
    <div class="seccion">
      <h4 class="titulo-grande">Información de Perfil</h4>
      <p class="texto-base">
        <b>Nombre:</b> {{ nombre }}<br />
        <b>Edad:</b> {{ edad }} años<br />
        <b>Ciudad:</b> {{ ciudad }}<br />
        Hola, mi nombre es {{ nombre }}, tengo {{ edad }} años y vivo en {{
        ciudad }}.
      </p>
    </div>
    <div class="seccion">
      <h4 class="titulo-grande">
        Contador Interactivo
      </h4>
      <div class="todo-centrado espacio-grande arriba-banda">
        <boton-app tipo="boton-negro" @click="incrementar">
          +
        </boton-app>
        <h1 class="titulo-mediano">Contador: {{ contador }}</h1>
        <boton-app tipo="boton-negro" @click="decrementar">
          -
        </boton-app>
      </div>
    </div>
  </div>




    
  <script>

       Vue.component("boton-app", {
      props: {
        tipo: {
          type: String,
          default: "",
        },
        chico: {
          type: Boolean,
          default: false,
        },
      },
      template: `
        <button
          type="button"
          class="boton"
          :class="[tipo, { botoncito: chico }]"
          @click="$emit('click', $event)"
        >
          <slot></slot>
        </button>
      `,
    });





    new Vue({
      el: "#app",
      data() {
        return {
          nombre: "Ana García",
          edad: 30,
          ciudad: "Madrid",
          contador: 0
        };
      },


      methods: {
        incrementar() {
          this.contador++;
        },
        decrementar() {
          this.contador--;
        },
      },


      computed: {
        
      },
    });
</script>

  




  <style>
   
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: sans-serif;
      margin: 0;
    }

    .app {
      margin: 2rem;
      text-align: center;
    }

    .seccion {
      border-bottom: 1px solid #000000;
      padding: 2rem;
    }

    h4 {
      margin-bottom: 1rem;
    }

    .titulo-grande {
      font-size: 1.5rem;
      font-weight: bold;
    }

     .titulo-mediano {
      font-size: 0.8rem;
      font-weight: bold;
    }
    
    .texto-base {
      font-size: 1rem;
      line-height: 1.5;
      text-align: left;
    }

    /* Botones */
    .boton {
      display: inline-block;
      padding: 0.375rem 0.75rem;
      border: 1px solid transparent;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1.5;
    }
    .botoncito {
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem;
    }
    .boton-negro {
      background-color: #000000;
      border-color: #000000;
      color: #ffffff;
    }
    .boton-negro:hover {
      background-color: #333333;
      border-color: #333333;
      color: #ffffff;
    }
    .boton-con-marco {
      background-color: transparent;
      border: 1px solid #000000;
      color: #000000;
    }
    .boton-con-marco:hover {
      background-color: #000000;
      color: #ffffff;
    }

   
    
    
  </style>



</body>

</html>
